<!DOCTYPE html>
<html>
<head><title>Voice Bridge</title></head>
<body>
  <h2>Voice Bridge</h2>
  <p id="status">Starting...</p>
  <p id="result">—</p>

  <script>
    const PHRASES = ["hello queen", "salute", "stop"];

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    const recognition = new webkitSpeechRecognition();
    recognition.continuous    = true;
    recognition.interimResults = false;
    recognition.lang          = "en-US";

    recognition.onstart = () => setStatus("Listening...");

    recognition.onresult = (event) => {
      const transcript = event.results[event.results.length - 1][0].transcript
                            .trim().toLowerCase();
      document.getElementById("result").textContent = "Heard: " + transcript;

      for (const phrase of PHRASES) {
        if (transcript.includes(phrase)) {
          document.getElementById("result").textContent = "✓ MATCH: " + phrase;
          fetch("http://127.0.0.1:6007/phrase?text=" + encodeURIComponent(phrase));
          break;
        }
      }
    };

    recognition.onend = () => recognition.start();
    recognition.start();
  </script>
</body>
</html>
